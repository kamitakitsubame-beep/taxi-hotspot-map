name: Update events data

on:
  schedule:
    # 毎日 05:00 JST（= 前日 20:00 UTC）に実行
    - cron: "0 20 * * *"
  workflow_dispatch: {} # 手動実行も可能

# auto-commit のために書き込み権限を付与
permissions:
  contents: write

concurrency:
  group: update-events
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: scripts/requirements.txt

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Run scraper
        run: python scripts/scrape_events.py

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if [ -n "$(git status --porcelain data/events.json)" ]; then
            git add data/events.json
            git commit -m "chore: update events data ($(date -u +'%Y-%m-%d %H:%M UTC'))"
            git push
            echo "events.json を更新しました。"
          else
            echo "変更なし。コミットをスキップします。"
          fi
